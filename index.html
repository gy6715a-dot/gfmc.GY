<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금천구시설관리공단 - 디지털 인권상담소</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef4fc 0%, #ffffff 50%, #eef4fc 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            color: #1e293b;
        }

        /* 상단 헤더 영역 */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -1.2px;
            line-height: 1;
        }

        .main-title {
            font-size: 54px;
            font-weight: 800;
            color: #00337c;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
        }

        .sub-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .line {
            width: 100px;
            height: 1px;
            background-color: #cbd5e1;
        }

        .sub-title {
            font-size: 19px;
            color: #334155;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        /* 메인 컨텐츠 및 카드 */
        .container {
            display: flex;
            gap: 35px;
            max-width: 960px;
            width: 100%;
            justify-content: center;
            margin-bottom: 60px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            flex: 1;
            max-width: 440px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .card.left { border-top: 10px solid #ff5a36; }
        .card.right { border-top: 10px solid #ffa827; }

        .shortcut-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 20px;
        }
        .card.left .shortcut-icon { color: #ff5a36; }
        .card.right .shortcut-icon { color: #ffa827; }

        .circle-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 30px;
        }
        .card.left .circle-icon { background-color: #fff1ee; color: #ff5a36; }
        .card.right .circle-icon { background-color: #fff7eb; color: #ffa827; }

        .card-title {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.3;
        }
        .card.left .card-title { color: #ff5a36; }
        .card.right .card-title { color: #ff8a00; }

        .card-line {
            width: 75%;
            height: 1px;
            background-color: #e2e8f0;
            margin-bottom: 25px;
        }

        .card-desc {
            font-size: 19px;
            color: #334155;
            line-height: 1.6;
            font-weight: 500;
        }

        /* 하단 알림선 및 저작권 정보 */
        footer {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .info-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #004ec4;
            font-weight: 600;
            font-size: 16px;
            border-radius: 30px;
        }

        .copyright {
            font-size: 15px;
            color: #94a3b8;
        }

        /* 모바일 대응 반응형 브레이크포인트 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                padding: 0 10px;
            }
            .card {
                width: 100%;
                max-width: 100%;
            }
            .main-title {
                font-size: 38px;
            }
            .line {
                width: 50px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-text">금천구시설관리공단</div>
        </div>
        <h1 class="main-title">디지털 인권상담소</h1>
        <div class="sub-title-wrapper">
            <div class="line"></div>
            <p class="sub-title">원하는 서비스를 선택해 주세요.</p>
            <div class="line"></div>
        </div>
    </header>

    <main class="container">
        <a href="https://sites.google.com/view/gfmchumanright/%ED%99%88" target="_blank" class="card left">
            <i class="fa-solid fa-arrow-up-right-from-square shortcut-icon"></i>
            <div class="circle-icon">
                <i class="fa-regular fa-comment-dots"></i>
            </div>
            <h2 class="card-title">인권상담소</h2>
            <div class="card-line"></div>
            <p class="card-desc">
                인권침해 규정 · 사례<br>
                구제절차 안내
            </p>
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSct22gBhF4Fy-6gXvRfTFQKBeS2giK83wIU6CD3hTUjrD1C-A/viewform" target="_blank" class="card right">
            <i class="fa-solid fa-arrow-up-right-from-square shortcut-icon"></i>
            <div class="circle-icon">
                <i class="fa-solid fa-bullhorn"></i>
            </div>
            <h2 class="card-title">알리GO바로잡GO<br><span style="font-size: 24px; font-weight: 600;">(익명신고센터)</span></h2>
            <div class="card-line"></div>
            <p class="card-desc">
                인권침해 및 부패행위<br>
                익명신고
            </p>
        </a>
    </main>

    <footer>
        <div class="info-notice">
            <i class="fa-regular fa-circle-check"></i>
            <span>모든 신고와 상담은 철저히 보호되며, 익명으로 안전하게 이용하실 수 있습니다.</span>
        </div>
        <p class="copyright">Copyright © 금천구시설관리공단. All Rights Reserved.</p>
    </footer>

</body>
</html>
