<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금천구시설관리공단 디지털 인권상담소</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Malgun Gothic","맑은 고딕",sans-serif;
    background:#f4f7fb;
    color:#222;
}

.header{
    background:linear-gradient(135deg,#005BAC,#2D7FD3);
    color:white;
    text-align:center;
    padding:70px 20px;
}

.header h2{
    font-size:22px;
    font-weight:400;
    margin-bottom:10px;
}

.header h1{
    font-size:44px;
    margin-bottom:15px;
}

.header p{
    font-size:18px;
}

.container{
    max-width:1100px;
    margin:-35px auto 60px;
    padding:0 20px;
}

.cards{
    display:flex;
    gap:30px;
}

.card{
    flex:1;
    background:white;
    border-radius:18px;
    padding:60px 40px;
    text-align:center;
    text-decoration:none;
    color:#222;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
    transition:.25s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 36px rgba(0,0,0,.18);
}

.card:first-child{
    border-top:7px solid #FF6B35;
}

.card:last-child{
    border-top:7px solid #E67E22;
}

.card h3{
    font-size:32px;
    margin-bottom:25px;
}

.card small{
    display:block;
    margin-top:8px;
    color:#666;
    font-size:18px;
}

.card p{
    font-size:20px;
    line-height:1.8;
    color:#666;
}

.footer{
    text-align:center;
    padding:30px;
    color:#888;
    font-size:14px;
}

@media(max-width:768px){

.cards{
    flex-direction:column;
}

.header h1{
    font-size:34px;
}

.card{
    padding:45px 30px;
}

}
</style>

</head>

<body>

<header class="header">

<h2>금천구시설관리공단</h2>

<h1>디지털 인권상담소</h1>

<p>원하는 서비스를 선택해 주세요.</p>

</header>

<div class="container">

<div class="cards">

<a class="card"
href="https://sites.google.com/view/gfmchumanright/%ED%99%88">

<h3>인권상담소</h3>

<p>
인권침해 규정 · 사례<br>
· 구제절차 안내
</p>

</a>

<a class="card"
href="https://docs.google.com/forms/d/e/1FAIpQLSct22gBhF4Fy-6gXvRfTFQKBeS2giK83wIU6CD3hTUjrD1C-A/viewform">

<h3>
알리GO바로잡GO
<small>(익명신고센터)</small>
</h3>

<p>
인권침해 및 부패행위<br>
익명신고
</p>

</a>

</div>

</div>

<footer class="footer">
Copyright © 금천구시설관리공단. All Rights Reserved.
</footer>

</body>
</html>
